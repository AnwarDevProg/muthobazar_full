name: customer_app
description: MuthoBazar customer application
publish_to: 'none'
version: 0.1.0+1

resolution: workspace
environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cached_network_image: ^3.4.1
  cloud_firestore: ^6.1.3
  cloud_functions: ^6.1.0
  cupertino_icons: ^1.0.8
  firebase_app_check: ^0.4.1+5
  firebase_auth: ^6.2.0
  firebase_core: ^4.5.0
  firebase_storage: ^13.1.0
  flutter_image_compress: ^2.4.0
  flutter_local_notifications: ^21.0.0
  get: ^4.6.6
  get_storage: ^2.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.2.1
  lottie: ^3.1.2
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  pinput: ^6.0.2
  shared_preferences: ^2.3.2
  smooth_page_indicator: ^2.0.1

  shared_core:
    path: ../../packages/shared_core
  shared_models:
    path: ../../packages/shared_models
  shared_contracts:
    path: ../../packages/shared_contracts
  shared_repositories:
    path: ../../packages/shared_repositories
  shared_services:
    path: ../../packages/shared_services
  shared_ui:
    path: ../../packages/shared_ui
  shared_usecases:
    path: ../../packages/shared_usecases
  shared_workflows:
    path: ../../packages/shared_workflows

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  pubspec_dependency_sorter: ^1.0.5

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/BuyOnline.json
    - assets/lottie/Delivery.json
    - assets/lottie/Payment.json
    - assets/lottie/SaveTime.json

